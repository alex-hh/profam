_target_: src.pipelines.callback.SamplingEvaluationPipelineCallback
defaults:
  - /pipeline: parquet
  - /evaluator: esmfold
  - /prompt_builder: default
  - /preprocessor@prompt_builder.preprocessor: null  # must be set
prompt_builder:
  max_tokens: ${data.max_tokens}
  seed: 42
evaluator:
  num_samples: null
sampling_kwargs:
  batch_size: 3
  max_generated_length: ${.evaluator.max_length}
  temperature: 0.1
pipeline:
  num_generations: 3
  save_results_to_file: false
  evaluation_parquet: null
  evaluation_accessions_file: null
  max_instances: null
  pipeline_id: foldseek_n${.pipeline.num_generations}  # for callback this doesnt matter
  preprocessor:
    _target_: src.data.preprocessing.ParquetStructurePreprocessor
    structure_tokens_col: null
    infer_representative_from_identifier: True
