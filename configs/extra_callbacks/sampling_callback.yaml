_target_: src.pipelines.callback.SamplingEvaluationPipelineCallback
pipeline:
  _target_: src.pipelines.family_sequence.FamilySequenceEvaluationPipeline
  parquet_path: "../data/funfams/s100_noali_parquets/train_val_test_split/val/val_000.parquet"
  num_generations: 3
  max_tokens: 20000
  max_generated_length: 90
  pipeline_id: funfam_val
  save_results_to_file: false
evaluators:
  _target_: src.evaluators.esmfold.ESMFoldSamplingEvaluator
  name: esmfold_example
prompt_builder:
  _target_: src.models.inference.PromptBuilder
  preprocessor:
  _target_: src.data.processors.AlignedProteinPreprocessingConfig
    document_token: "[RAW]"
    drop_first_protein: false
    keep_first_protein: false
    allow_unk: false
    max_tokens_per_example: 8192
    shuffle_proteins_in_document: false
    padding: "do_not_pad"
    # alignment config
    keep_gaps: false
    keep_insertions: true
    to_upper: true
    use_msa_pos: false
