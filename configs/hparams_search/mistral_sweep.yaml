program: src/train.py
method: bayes  # 可以选择 'random', 'grid', 或 'bayes'
metric:
  name: val/loss/dataloader_idx_0  # 根据您的设置可能需要调整
  goal: minimize  # 或者 'maximize'，取决于你的优化目标
  
parameters:
  model.scheduler_name:
    values: ['inverse_sqrt', 'cosine']
  model.num_warmup_steps:
    distribution: uniform
    min: 100
    max: 1000
  model.lr:
    distribution: log_uniform  # 由于学习率通常在对数尺度上调整更为合理
    min: 0.00001
    max: 0.001
  model.config.hidden_act:
    values: ['silu', 'relu', 'gelu']
  model.config.hidden_size:
    values: [256, 512, 768]
  model.config.attention_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  model.config.initializer_range:
    distribution: uniform
    min: 0.01
    max: 0.05
  model.config.intermediate_size:
    values: [512, 1024, 2048]
  model.config.num_attention_heads:
    values: [8, 12, 16]
  model.config.num_experts_per_tok:
    values: [1, 2, 4]
  model.config.num_hidden_layers:
    values: [6, 12, 24]
  model.config.num_key_value_heads:
    values: [8, 12, 16]
  model.config.num_local_experts:
    values: [4, 8, 12]
  model.config.router_aux_loss_coef:
    distribution: log_uniform
    min: 0.0001
    max: 0.01
  model.config.router_jitter_noise:
    distribution: uniform
    min: 0.0
    max: 0.1
    
early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 5

command:
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}
  - "experiment=mistral_multi_msa"
  - logger=wandb
