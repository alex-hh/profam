# @package _global_
defaults:
  - /extra_callbacks@extra_callbacks.unconditional_sampling_callback: unconditional_sampling_callback
  - override /callbacks: default_no_shuffle_and_step_grad_accum
  - override /data: null          # we supply a custom data config below
  - override /model: llama_251m
  - override /trainer: gpus_ddp
  - override /logger: wandb
  - _self_

experiment_group: "ur90"
tags:
  - "${experiment_group}"
  - "lr${model.lr}" 
  - "acc_sched"
  - "wd${model.weight_decay}"
  - "pack${data.pack_to_max_tokens}"
  - "ur90crop320"
  - "ur90crop1024"

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 1
  target_tokens_per_batch: null
  tokens_per_document: 30000
  min_epochs: 1000
  max_epochs: 10000
  val_check_interval: 100000
  accumulate_grad_batches: 2
  use_distributed_sampler: False # required  when we use our custom Sampler

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "/home/jovyan/shared/judewells/profam/data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 2000
  num_training_steps: 1000000
  weight_decay: 0.2
  lr: 1e-3
  embed_sequence_index: false
  embed_residue_index: false
  use_focal_loss: false
  config:
    attn_implementation: flash_attention_2

data:
  _target_: src.data.datamodule.ProteinDataMixture
  ## Dataset builders -----------------------------------------------------------
  dataset_builders:

    proteingym:
      _target_: src.data.builders.proteingym.ProteinGymDataset
      name: proteingym
      dms_ids: ${constants.gym_val_assay_list}
      seed: 42
      max_mutated_sequences: null
      mutant_bos_token: sep
      keep_gaps: false
      use_filtered_msa: true
      extra_tokens_per_document: 2
      use_msa_pos: false
      num_proc: null
      max_tokens_per_example: 7500
      max_context_seqs: 0
      keep_wt: false
      drop_wt: false

    uniref90_train:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: uniref90_train
      dataset_root: ${paths.data_dir}/uniref/uniref90_text_shuffled/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 320
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0

    uniref90_train_1024:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: uniref90_train_1024
      dataset_root: ${paths.data_dir}/uniref/uniref90_text_shuffled/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 1024
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0


    uniref90_val_320:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: uniref90_val_320
      dataset_root: ${paths.data_dir}/uniref/uniref90_text_shuffled/train_test_split_v2/val_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 1024
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0
    
    uniref90_val_1024:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: uniref90_val_1024
      dataset_root: ${paths.data_dir}/uniref/uniref90_text_shuffled/train_test_split_v2/val_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 1024
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0
  
  # -----------------------------------------------------------
  data_weights:
    uniref90_train: 0.9
    uniref90_train_1024: 0.1
  val_dataset_batch_sizes:
    uniref90_val_320: 1
    uniref90_val_1024: 1

  batch_size: 100
  data_dir: ${paths.data_dir}
  num_workers: 32
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  pack_to_max_tokens: 56_000
  prefetch_factor: 4
  shuffle: true
  interleaved: true
  interleaved_block_size: 1000 # number of samples to interleave all datasets. large values will be slower with better weight accuracy. 1000 should be fine
  total_num_train_samples: null
