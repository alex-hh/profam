defaults:
  - override /data: protein
  - override /model: protein
  - override /callbacks: default
  - override /trainer: default



tags: ["mnist", "simple_dense_net"]

seed: 12345

trainer:
  min_epochs: 20
  max_epochs: 200
  gradient_clip_val: 0.5

model:
  optimizer:
    lr: 0.002
  net:
    lin1_size: 128
    lin2_size: 256
    lin3_size: 64
  compile: false

data:
  batch_size: 64

logger:
  wandb:
    tags: ${tags}
    group: "mnist"
  aim:
    experiment: "mnist"
