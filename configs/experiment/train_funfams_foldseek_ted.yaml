# @package _global_
defaults:
  - /extra_callbacks@extra_callbacks.funfam_sampling_callback: sampling_callback
  - override /data: null
  - override /model: llama_small
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: wandb
  - _self_

experiment_group: "train_ff_fs_ted_pg"
tags: ["debug", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 1
  target_tokens_per_batch: 256000
  tokens_per_document: 30000
  min_epochs: 1000
  max_epochs: 100000
  val_check_interval: 3000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 1000
  num_training_steps: 9000000000
  lr: 1e-3
  embed_sequence_index: true
  embed_residue_index: true

data:
  dataset_builders:

    proteingym:
      _target_: src.data.builders.proteingym.ProteinGymDataset
      name: proteingym
      dms_ids: ${constants.gym_val_assay_list}
      seed: 42
      max_mutated_sequences: null
      mutant_bos_token: sep
      keep_gaps: false
      use_filtered_msa: true
      extra_tokens_per_document: 2
      use_msa_pos: false
      num_proc: null
      max_tokens_per_example: 7500


    funfams_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.AlignedProteinPreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
          keep_gaps: false
          keep_insertions: true
          to_upper: true
          use_msa_pos: false
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: funfams_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: funfams/s50_parquets/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1


    funfams_s100:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: funfams_s100
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: funfams/s100_noali_parquets/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1


    ted_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: ted_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: ted/s50_parquets/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1


    foldseek_reps_single:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_reps_single
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: foldseek/foldseek_reps_single/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1


    foldseek_s100:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_s100
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: foldseek/foldseek_s100_raw/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1

    foldseek_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: foldseek/foldseek_s50_seq_only/train_val_test_split/train/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1

    val_ted_s50:
      _target_: src.data.builders.SequenceDocumentMapDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: false
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: val_ted_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: ted/s50_parquets/train_val_test_split/val/val_000.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1

    val_foldseek_s50:
      _target_: src.data.builders.SequenceDocumentMapDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: false
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: val_foldseek_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: foldseek/foldseek_s50_seq_only/train_val_test_split/val/val_1840_2300_003.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1


    val_funfams_s50:
      _target_: src.data.builders.SequenceDocumentMapDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.AlignedProteinPreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 32000
          shuffle_proteins_in_document: false
          padding: do_not_pad
          keep_gaps: false
          keep_insertions: true
          to_upper: true
          use_msa_pos: false
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: val_funfams_s50
      cfg:
        _target_: src.data.builders.HFProteinDatasetConfig
        data_path_pattern: funfams/s50_parquets/train_val_test_split/val/*.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1

  _target_: src.data.datamodule.ProteinDataMixture
  total_num_train_samples: 2_000_000
  data_weights:
    funfams_s100: 1
    funfams_s50: 1
    ted_s50: 1
    foldseek_reps_single: 1
    foldseek_s100: 1
    foldseek_s50: 1
  batch_size: 1
  data_dir: ${paths.data_dir}
  num_workers: 12
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  val_dataset_batch_sizes:
    val_ted_s50: 1
    val_funfams_s50: 1
    val_foldseek_s50: 1
    proteingym: 1
  pack_to_max_tokens: 150000
