# @package _global_
# Experiment: train on FunFams memmap dataset using ProteinDataMixture
# ---------------------------------------------------------------
# This is a copy of `train_funfam_text.yaml` adapted to use the
# ProteinDataMixture LightningDataModule so we can exercise the
# new `ProteinFamilyMemmapDatasetBuilder` within the mixed-dataset
# pipeline (even if we only provide a single training source here).
# ---------------------------------------------------------------

defaults:
  - /extra_callbacks@extra_callbacks.unconditional_sampling_callback: unconditional_sampling_callback
  - /data/dataset@data.dataset_builders.foldseek_s50_raw_val: foldseek_s50_raw
  - override /data: null
  - override /model: llama_nano
  - override /callbacks: default_with_shuffle
  - override /trainer: gpus_ddp
  - override /logger: wandb
  - _self_

experiment_group: "train_funfam_memmap_mixture"
tags: ["${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 1
  target_tokens_per_batch: 256000
  tokens_per_document: 30000
  min_epochs: 1000
  max_epochs: 10000
  val_check_interval: 2000
  use_distributed_sampler: False # required  when we use our custom Sampler

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 200
  num_training_steps: 1000000
  lr: 1e-3
  embed_sequence_index: false
  embed_residue_index: false
  config:
    attn_implementation: flash_attention_2

data:
  _target_: src.data.datamodule.ProteinDataMixture
  # -----------------------------------------------------------
  # Dataset builders
  dataset_builders:
    funfams_s50_train:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: funfams_s50_train
      dataset_root: ${paths.data_dir}/funfams/s50_text/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      seed: ${seed}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.AlignedProteinPreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
          keep_gaps: false
          keep_insertions: true
          to_upper: true
          use_msa_pos: false
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0


    foldseek_s50_train:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: foldseek_s50_train
      dataset_root: ${paths.data_dir}/foldseek/foldseek_s50_seq_only_text/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      seed: ${seed}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0


    openfold_train:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: openfold_train
      dataset_root: ${paths.data_dir}/openfold/uniclust30_clustered_shuffled_final_text/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.AlignedProteinPreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
          keep_gaps: false
          keep_insertions: true
          to_upper: true
          use_msa_pos: false
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0
    uniref90_train:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: uniref90_train
      dataset_root: ${paths.data_dir}/uniref/uniref90_text_shuffled/train_test_split_v2/train_filtered
      tokenizer: ${tokenizer}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 820
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0

    funfams_s50_val:
      _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDatasetBuilder
      name: funfams_s50_val
      dataset_root: ${paths.data_dir}/funfams/s50_text/train_test_split_v2/val_filtered
      tokenizer: ${tokenizer}
      # preprocessor: ${data.dataset_builders.funfams_s50_train.preprocessor}
      preprocessor:
        _target_: src.data.processors.ProteinDocumentPreprocessor
        cfg:
          _target_: src.data.processors.AlignedProteinPreprocessingConfig
          document_token: "[RAW]"
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: "do_not_pad"
          keep_gaps: false
          keep_insertions: true
          to_upper: true
          use_msa_pos: false
        transform_fns:
          - _target_: src.data.processors.transforms.replace_nans_in_coords
            _partial_: true
            fill_value: 0.0

  ########## VALIDATION DATASETS ##########

    proteingym:
      _target_: src.data.builders.proteingym.ProteinGymDataset
      name: proteingym
      dms_ids: ${constants.gym_val_assay_list}
      seed: 42
      max_mutated_sequences: null
      mutant_bos_token: sep
      keep_gaps: false
      use_filtered_msa: true
      extra_tokens_per_document: 2
      use_msa_pos: false
      num_proc: null
      max_tokens_per_example: 7500
      max_context_seqs: null
      keep_wt: false
      drop_wt: true

    foldseek_s50_raw_val:
      _target_: src.data.builders.SequenceDocumentMapDataset
      name: foldseek_s50_raw_val
      cfg:
        data_path_pattern: foldseek/foldseek_s50_seq_only/train_val_test_split/val/val_0_460_000.parquet


  # -----------------------------------------------------------

  data_weights:
    funfams_s50_train: 1
    foldseek_s50_train: 1
    uniref90_train: 1
    openfold_train: 1
  val_dataset_batch_sizes:
    funfams_s50_val: 1
    foldseek_s50_raw_val: 1
    proteingym: 1


  batch_size: 100
  data_dir: ${paths.data_dir}
  num_workers: 20
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  pack_to_max_tokens: 327680
  prefetch_factor: 4
  shuffle: true
  interleaved: true
  interleaved_block_size: 1000 # number of samples to interleave all datasets. large values will be slower with better weight accuracy. 1000 should be fine
  total_num_train_samples: null
