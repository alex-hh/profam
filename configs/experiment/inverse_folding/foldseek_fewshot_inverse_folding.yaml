# @package _global_

# TODO: should be possible to filter on the fly examples with sequence length < max_tokens
# to execute this experiment run:
# python train.py experiment=foldseek_small

defaults:
  - /extra_callbacks@extra_callbacks.esmfold_if: esmfold_if
  - /extra_callbacks@extra_callbacks.esmfold_if_high_plddt: esmfold_if
  - override /callbacks: default_with_shuffle
  - override /data: foldseek_interleaved_packed
  - override /model: llama_small

tags: ["foldseek_if"]

seed: 12345

extra_callbacks:
  esmfold_if:
    prompt_builder:
      _target_: src.models.inference.InterleavedInverseFoldingPromptBuilder
      preprocessor: ${data.dataset_builders.foldseek.preprocessor}
      seed: 42
    pipeline:
      num_generations: 1
      pipeline_id: foldseek_representatives
      evaluation_parquet: ${paths.data_dir}/${data.dataset_builders.foldseek_val.cfg.data_path_pattern}
      max_instances: 15
      max_protein_length: 512  # used to filter candidate target proteins
    match_representative_length: true
    sampling_kwargs:
      temperature: 0.3

  esmfold_if_high_plddt:
    prompt_builder:
      _target_: src.models.inference.InterleavedInverseFoldingPromptBuilder
      preprocessor: ${data.dataset_builders.foldseek.preprocessor}
      seed: 42
    pipeline:
      num_generations: 1
      pipeline_id: foldseek_representatives_high_plddt
      evaluation_parquet: ${paths.data_dir}/${data.dataset_builders.foldseek_val.cfg.data_path_pattern}
      max_instances: 15
      max_protein_length: 512  # used to filter candidate target proteins
      min_plddt: 0.9
    match_representative_length: true
    sampling_kwargs:
      temperature: 0.3

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  val_check_interval: 1.0  # number of BATCHES: not steps
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2
  tokens_per_document: ${data.pack_to_max_tokens}

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 1000
  scoring_max_tokens: 10240
  embed_coords: True

logger:
  wandb:
    tags: ${tags}
    group: "inverse_folding"

float32_matmul_precision: high
pre_evaluate_gym: false  # use to run evaluation first to check for issues
pre_evaluate_ec_class: false
experiment_group: inverse_folding