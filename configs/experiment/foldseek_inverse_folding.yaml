# @package _global_

# TODO: should be possible to filter on the fly examples with sequence length < max_tokens
# to execute this experiment run:
# python train.py experiment=foldseek_small

defaults:
  # TODO: write an inverse folding evaluator
  - /extra_callbacks@extra_callbacks.esmfold: esmfold
  - override /callbacks: default_with_shuffle
  - override /data: foldseek_representatives_interleaved
  - override /model: llama_small

tags: ["foldseek_if"]

seed: 12345

extra_callbacks:
  esmfold:
    prompt_builder:
      _target_: src.models.inference.InterleavedInverseFoldingPromptBuilder
      preprocessor: ${data.dataset_cfgs.foldseek.preprocessor}
      max_tokens: ${data.max_tokens}
      seed: 42
      representative_only: True
    pipeline:
      evaluation_parquet: ${paths.data_dir}/${data.dataset_cfgs.foldseek_val.data_path_pattern}
      max_instances: 50
      max_sequence_length: 512

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  val_check_interval: 5000  # number of BATCHES: not steps
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 1000
  scoring_max_tokens: 10240
  embed_coords: True

data:
  batch_size: 42
  num_workers: 12
  evaluate_gym: True
  evaluate_ec_class: True
  evaluate_ec_cluster_class: True

logger:
  wandb:
    tags: ${tags}
    group: "foldseek"

tokenizer:
  mask_below_plddt: 80

float32_matmul_precision: high
pre_evaluate_gym: false  # use to run evaluation first to check for issues
pre_evaluate_ec_class: false
