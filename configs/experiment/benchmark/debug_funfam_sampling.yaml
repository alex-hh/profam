# @package _global_
defaults:
  - /extra_callbacks.funfam_sampling_callback: sampling_callback
  - override /trainer: gpu
  - override /model: llama_test
  - override /data: example_data
  - override /logger: null_logger
  - _self_

# Name of this experiment
name: funfam_sampling_test

# Trainer settings explicitly copied and/or overridden
trainer:
  # from train_test.yaml
  accelerator: gpu
  devices: 1
  val_check_interval: 1.0
  target_tokens_per_batch: null
  num_sanity_val_steps: 0

  # overrides from debug_funfam_sampling.yaml
  min_epochs: 5
  max_epochs: 6

# Data settings copied from train_test.yaml
data:
  batch_size: 2
  num_workers: 0

# Dataset builders copied from train_test.yaml
dataset_builders:
  proteingym:
    gym_data_dir: "../tiny_data/ProteinGym"
