# @package _global_
defaults:
  - override /data: null
  - override /model: llama_test
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: null_logger
  - _self_


experiment_group: "train_single_seq"
tags: ["${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  val_check_interval: 10000
  target_tokens_per_batch: 256000
  min_epochs: 1000
  max_epochs: 10000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: medium

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  lr: 2e-3

data:
  dataset_builders:
    proteingym:
      _target_: src.data.builders.proteingym.ProteinGymDataset
      name: proteingym
      dms_ids: ${constants.gym_val_assay_list}
      seed: 42
      max_mutated_sequences: null
      mutant_bos_token: sep
      keep_gaps: false
      use_filtered_msa: true
      extra_tokens_per_document: 2
      use_msa_pos: true
      num_proc: null
      max_tokens_per_example: 4000


    foldseek_struct:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 100
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_struct
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: ../profam/data/example_data/foldseek_struct/0.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8

    foldseek_struct_val:
      _target_: src.data.builders.SequenceDocumentMapDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 100
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_struct_val
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: ../profam/data/example_data/foldseek_struct/0.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8

  _target_: src.data.datamodule.ProteinDataMixture
  data_weights:
    foldseek_struct: 1.0
  batch_size: 1
  data_dir: ${paths.data_dir}
  num_workers: 6
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  val_dataset_batch_sizes:
    foldseek_struct_val: 1
    proteingym: 1
  pack_to_max_tokens: 20000
