# @package _global_
defaults:
  - override /data: pfam
  - override /model: llama_medium
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - _self_


experiment_group: "benchmark"
tags: ["sequence_packing"]

seed: 12345

trainer:
  val_check_interval: 1.0
  target_tokens_per_batch: 256000
  min_epochs: 1
  max_epochs: 1

model:
  pass_res_pos_in_doc_as_position_ids: true  # required for efficient sequence packing with FA
