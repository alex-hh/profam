# @package _global_
defaults:
  - override /data: seq_is_random_res_pos
  - override /model: llama_medium
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: wandb
  - _self_

experiment_group: "train_all"
tags: ["llama_med", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 10
  target_tokens_per_batch: 256000
  min_epochs: 1000
  max_epochs: 100000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  lr: 2e-3
  embed_sequence_index: true
  embed_residue_index: true
