# @package _global_
defaults:
  - override /data: null
  - override /model: llama_small
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: wandb
  - _self_

experiment_group: "train_all"
tags: ["debug", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 100
  target_tokens_per_batch: 256000
  tokens_per_document: 10000
  min_epochs: 1000
  max_epochs: 100000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  lr: 2e-3
  embed_sequence_index: true
  embed_residue_index: true

data:
  dataset_builders:
    funfams_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: funfams_s50
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/funfams_s50_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    ted_s100:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: ted_s100
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/ted_s100_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    ted_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: ted_s50
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/ted_s50_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    foldseek_reps_single:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_reps_single
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/foldseek_reps_single_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    foldseek_s50:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_s50
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/foldseek_s50_struct_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    foldseek_s100:
      _target_: src.data.builders.SequenceDocumentIterableDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: foldseek_s100
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: mini_datasets/foldseek_s100_struct_mini.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1
        file_repeats: 8


    val_foldseek_s50:
      _target_: src.data.builders.SequenceDocumentMapDataset
      preprocessor:
        cfg:
          _target_: src.data.processors.PreprocessingConfig
          document_token: '[RAW]'
          drop_first_protein: false
          keep_first_protein: false
          allow_unk: false
          max_tokens_per_example: 8192
          shuffle_proteins_in_document: true
          padding: do_not_pad
        _target_: src.data.processors.ProteinDocumentPreprocessor
      name: val_foldseek_s50
      cfg:
        _target_: src.data.builders.ProteinDatasetConfig
        data_path_pattern: foldseek/foldseek_s50_struct/train_val_test_split/val/val_0_460_000.parquet
        holdout_data_files: null
        holdout_identifiers: null
        identifier_col: fam_id
        file_type: parquet
        minimum_sequences: 1

  _target_: src.data.datamodule.ProteinDataMixture
  total_num_train_samples: 5080
  data_weights:
    funfams_s50: 1.0
    foldseek_reps_single: 1.0
    ted_s50: 1.0
    ted_s100: 1.0
    foldseek_s50: 1.0
    foldseek_s100: 1.0
  batch_size: 1
  data_dir: ${paths.data_dir}
  num_workers: 12
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  val_dataset_batch_sizes:
    val_foldseek_s50: 1
  pack_to_max_tokens: 20000
