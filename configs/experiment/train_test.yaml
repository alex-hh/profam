# @package _global_
# config to use in github actions
defaults:
  - override /trainer: cpu
  - override /model: llama_test
  - override /data: example_data
  - override /logger: null_logger

trainer:
  max_epochs: 1
  val_check_interval: 1.0
  target_tokens_per_batch: null
  num_sanity_val_steps: 0

data:
  batch_size: 2
  num_workers: 0

dataset_builders:
  proteingym:
    gym_data_dir: "../tiny_data/ProteinGym"
    max_context_seqs: 2
