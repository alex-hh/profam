# @package _global_

# to execute this experiment run:
# python train.py experiment=foldseek_small

defaults:
  - override /data: pfam
  - override /model: llama_tiny
  - override /callbacks: default_with_shuffle

tags: ["pfam"]

seed: 12345

callbacks:
  + pfam_hmmer

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  val_check_interval: 1.0  # TODO: set this appropriately...
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 1000
  scoring_max_tokens: 10240

data:
  batch_size: 2
  num_workers: 12
  gym_dms_ids: [
    "BLAT_ECOLX_Jacquier_2013",
    "CALM1_HUMAN_Weile_2017",
    "DYR_ECOLI_Thompson_2019",
    "DLG4_RAT_McLaughlin_2012",
    "REV_HV1H2_Fernandes_2016",
    "TAT_HV1BR_Fernandes_2016",
    "RL40A_YEAST_Roscoe_2013",
    "P53_HUMAN_Giacomelli_2018_WT_Nutlin",
  ]

logger:
  wandb:
    tags: ${tags}
    group: "pfam"

float32_matmul_precision: high
pre_evaluate_gym: false  # use to run evaluation first to check for issues
pre_evaluate_ec_class: false
