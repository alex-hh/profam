# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: gym_single_msa
  - override /model: gpt2_small_single_family
  - override /callbacks: default
  - override /trainer: default

tags: ["gym_train"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  val_check_interval: 1.0
  check_val_every_n_epoch: 1

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 600

data:
  batch_size: 48
  num_workers: 12

logger:
  wandb:
    tags: ${tags}
    group: "gym_train_single_msa"

float32_matmul_precision: high
