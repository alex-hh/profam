# @package _global_

defaults:
  - override /data: gym_multi_msa
  - override /model: mistral
  - override /callbacks: default_with_shuffle
  - override /trainer: default



tags: ["mistral", "gym_train", "sweep"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  accumulate_grad_batches: 124
  val_check_interval: 1.0
  check_val_every_n_epoch: 1
  accelerator: gpu

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 400
  lr: 1e-4
  config:
    pad_token_id: 25 # fix
    bos_token_id: 26 # fix
    eos_token_id: 27 # fix
    hidden_act: "silu"
    hidden_size: 768
    attention_dropout: 0.0
    initializer_range: 0.02
    intermediate_size: 1024
    max_position_embeddings: 2048 # fix
    num_attention_heads: 12
    num_experts_per_tok: 2
    num_hidden_layers: 12
    num_key_value_heads: 12
    num_local_experts: 8
    output_router_logits: false # fixrms_norm_eps: 1e-05
    rope_theta: 1000000 # fix
    router_aux_loss_coef: 0.001
    router_jitter_noise: 0.0
    sliding_window: null # fix
    tie_word_embeddings: false # fix
    torch_dtype: "bfloat16" # fix
    transformers_version: "4.40.0.dev0" # fix
    use_cache: true # fix
    vocab_size: 29 # fix



data:
  batch_size: 4
  num_workers: 12
  gym_data_dir: data/example_data/ProteinGym
  data_dir: data/example_data
  mutant_bos_token: "sep"
  gym_dms_ids: [
    "BLAT_ECOLX_Jacquier_2013",
    # "CALM1_HUMAN_Weile_2017",
    # "DYR_ECOLI_Thompson_2019",
    # "DLG4_RAT_McLaughlin_2012",
    # "REV_HV1H2_Fernandes_2016",
    # "TAT_HV1BR_Fernandes_2016",
    # "RL40A_YEAST_Roscoe_2013",
    # "P53_HUMAN_Giacomelli_2018_WT_Nutlin",
  ]
  use_seq_pos: true
  max_seq_pos: 2048
  dataset_cfg:
    file_repeats: 100
  val_dataset_cfg:
    # evaluate just on BLAT for now
    data_path_pattern: ProteinGym/DMS_msa_files/BLAT_ECOLX_full_11-26-2021_b02.a2m

logger:
  wandb:
    tags: ${tags}
    group: "gym_train_multi_msa"
    offline: false

float32_matmul_precision: high
ckpt_path: null
