# @package _global_
defaults:
  - /extra_callbacks@extra_callbacks.unconditional_sampling_callback: unconditional_sampling_callback
  - override /data: uniref90_single
  - override /model: llama_32_1b
  - override /callbacks: default_with_shuffle
  - override /trainer: gpus_ddp
  - override /logger: wandb
  - _self_


experiment_group: "train_single_seq_ur90_1bn"
tags: ["llama_500m", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  val_check_interval: 10000
  target_tokens_per_batch: 512000
  min_epochs: 1000
  max_epochs: 1000
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  lr: 1e-3
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 2000
  use_kv_cache_for_scoring: true
  embed_coords: false
  embed_sequence_index: false
  embed_residue_index: false
