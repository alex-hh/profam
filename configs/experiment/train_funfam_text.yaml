# @package _global_
# trains a family model on combined dataset combining:
# foldseek uniref90 single sequence and openfold_clustered_raw
defaults:
  - /extra_callbacks@extra_callbacks.unconditional_sampling_callback: unconditional_sampling_callback
  # - /data/dataset@data.dataset_builders.uniref90: uniref90_single_raw
  # - /data/dataset@data.dataset_builders.foldseek_s50_raw: foldseek_s50_raw
  # - /data/dataset@data.dataset_builders.foldseek_s50_raw_val: foldseek_s50_raw
  # - /data/dataset@data.dataset_builders.uniref90_val: uniref90_single_raw
  - override /data: null
  - override /model: llama_251m.yaml
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  # - override /logger: wandb
  - override /logger: null
  - _self_

experiment_group: "train_foldseekS50_UR90_251m"
tags: ["${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 1
  target_tokens_per_batch: 256000
  tokens_per_document: 30000
  min_epochs: 1000
  max_epochs: 100000
  val_check_interval: 3000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 200
  num_training_steps: 9000000000
  lr: 1e-3
  embed_sequence_index: false
  embed_residue_index: false

data:
  _target_: src.data.datamodule.ProteinMemmapDataModule
  val_dataset_batch_sizes: null
  batch_size: 1
  data_dir: ${paths.data_dir}
  num_workers: 0
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  pack_to_max_tokens: 5000
  prefetch_factor: null
  val_dataset: ${data.train_dataset}
  test_dataset: null
  train_dataset:
    _target_: src.data.builders.family_text_memmap_datasets.ProteinFamilyMemmapDataset
    name: funfams_s50
    dataset_root: ${paths.data_dir}/funfams/s50_text/train_test_split_v2/train_filtered
    tokenizer: ${tokenizer}
    preprocessor:
      _target_: src.data.processors.ProteinDocumentPreprocessor
      cfg:
        _target_: src.data.processors.AlignedProteinPreprocessingConfig
        document_token: "[RAW]"
        drop_first_protein: false
        keep_first_protein: false
        allow_unk: false
        max_tokens_per_example: 8192
        shuffle_proteins_in_document: true
        padding: "do_not_pad"
        # alignment config
        keep_gaps: false
        keep_insertions: true
        to_upper: true
        use_msa_pos: false
      transform_fns:
      - _target_: src.data.processors.transforms.replace_nans_in_coords
        _partial_: true
        fill_value: 0.0



