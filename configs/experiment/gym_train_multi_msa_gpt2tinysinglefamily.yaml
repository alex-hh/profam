# @package _global_
# train across multiple ProteinGym msas, concatenating sets
# of sequences to form context aware single sequence inputs to the model
# but score with a single-sequence model without any context

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: gym_multi_msa
  - override /model: gpt2_tiny_single_family
  - override /callbacks: default_with_shuffle
  - override /trainer: default

experiment_group: "gym_train"
tags: ["${.experiment_group}"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  val_check_interval: 1.0
  check_val_every_n_epoch: 1

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 200

data:
  batch_size: 8
  num_workers: 40
  mutant_bos_token: "bos"  # for consistency when using single family scoring
  gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "CALM1_HUMAN_Weile_2017", "DYR_ECOLI_Thompson_2019", "DLG4_RAT_McLaughlin_2012", "REV_HV1H2_Fernandes_2016", "TAT_HV1BR_Fernandes_2016", "RL40A_YEAST_Roscoe_2013", "P53_HUMAN_Giacomelli_2018_WT_Nutlin"]
  dataset_cfg:
    # data_path_pattern: ProteinGym/DMS_msa_files/*.a2m
    file_repeats: 100

logger:
  wandb:
    tags: ${tags}
    group: "gym_train_multi_msa"

float32_matmul_precision: high
