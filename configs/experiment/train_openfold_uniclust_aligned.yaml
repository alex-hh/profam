# @package _global_
defaults:
  - /extra_callbacks@extra_callbacks.unconditional_sampling_callback: unconditional_sampling_callback
  - /extra_callbacks@extra_callbacks.funfam_sampling_callback: sampling_callback
  - /data/dataset@data.dataset_builders.openfold_clustered_msa_pos: openfold_clustered_msa_pos
  - /data/dataset@data.dataset_builders.openfold_clustered_msa_pos_val: openfold_clustered_msa_pos
  - override /data: null
  - override /model: llama_106m.yaml
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: wandb
  - _self_

experiment_group: "train_openfold_aligned"
tags: ["debug", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  check_val_every_n_epoch: 1
  target_tokens_per_batch: 256000
  tokens_per_document: 30000
  min_epochs: 1000
  max_epochs: 100000
  val_check_interval: 3000

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  scheduler_name: "constant_with_warmup"
  num_warmup_steps: 200
  num_training_steps: 9000000000
  lr: 1e-3
  embed_sequence_index: false
  embed_residue_index: true

data:
  dataset_builders:

    proteingym:
      _target_: src.data.builders.proteingym.ProteinGymDataset
      name: proteingym
      dms_ids: ${constants.gym_val_assay_list}
      seed: 42
      max_mutated_sequences: null
      mutant_bos_token: sep
      keep_gaps: false
      use_filtered_msa: true
      extra_tokens_per_document: 2
      use_msa_pos: true
      num_proc: null
      max_tokens_per_example: 16_000


    openfold_clustered_msa_pos_val:
      _target_: src.data.builders.SequenceDocumentMapDataset
      name: openfold_clustered_msa_pos_val
      cfg:
        data_path_pattern: openfold/uniclust30_clustered/0.parquet_fragments_0.parquet

  _target_: src.data.datamodule.ProteinDataMixture
  total_num_train_samples: 2_000_000
  data_weights:
    openfold_clustered_msa_pos: 1
  batch_size: 1
  data_dir: ${paths.data_dir}
  num_workers: 24
  ignore_gaps: true
  feature_names: ${constants.sequence_features}
  val_dataset_batch_sizes:
    openfold_clustered_msa_pos_val: 1
    proteingym: 1
  pack_to_max_tokens: 16_000
