# @package _global_
defaults:
  - override /data: afdb_s50_single
  - override /model: llama_32_1b
  - override /callbacks: default_with_shuffle
  - override /trainer: gpu
  - override /logger: wandb
  - _self_


experiment_group: "train_single_seq"
tags: ["llama_med", "${experiment_group}"]

seed: 12345

trainer:
  devices: auto
  val_check_interval: 10000
  target_tokens_per_batch: 500000
  min_epochs: 4
  max_epochs: 5
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"

logger:
  wandb:
    tags: ${tags}

float32_matmul_precision: high

paths:
  data_dir: "../data"

model:
  use_kv_cache_for_scoring: true
  embed_coords: false
  embed_sequence_index: true
  embed_residue_index: true
