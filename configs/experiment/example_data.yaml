# @package _global_
# train across multiple ProteinGym msas, concatenating sets
# of sequences to form context aware single sequence inputs to the model
# ALSO with a context-aware model

# to execute this experiment run:
# python train.py experiment=example

# N.B. we might get slightly weird distribution of msas across shards in this setup.
# (if we shuffle after repeat then shard, for example.)

defaults:
  - override /data: example_data
  - override /model: llama_tiny
  - override /callbacks: default_with_shuffle
  - override /trainer: default

tags: ["gym_train"]

seed: 12345

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 1.0
  accumulate_grad_batches: 124
  val_check_interval: 1.0
  check_val_every_n_epoch: 1

model:
  scheduler_name: "inverse_sqrt"  # inverse_sqrt, cosine, ...
  num_warmup_steps: 1000
  lr: 1e-4

data:
  batch_size: 4
  num_workers: 12
  evaluate_gym: false
  use_seq_pos: false
  max_tokens: 2048
  dataset_cfgs:
    openfold_aligned:
      file_repeats: 50
    openfold_raw:
      file_repeats: 50
    ec:
      file_repeats: 50
    # dont repeat val dataset
    # interpro:
    #   file_repeats: 50

logger:
  wandb:
    tags: ${tags}
    group: "example_data"

float32_matmul_precision: high
ckpt_path: null
