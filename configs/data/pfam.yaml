_target_: src.data.hf_protein_datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.pfam: pfam
  - dataset@dataset_builders.pfam_val: pfam
  - _self_
data_weights:
  pfam: 1.0
dataset_builders:
  pfam_val:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val
batch_size: 22
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  pfam_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
feature_names: ${constants.sequence_feature_names}
