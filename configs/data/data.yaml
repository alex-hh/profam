_target_: src.data.hf_protein_datamodule.ProteinDataModule
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.openfold_aligned: openfold_aligned
  - dataset@dataset_cfgs.openfold_raw: openfold_raw
  - dataset@dataset_cfgs.ec: ec
  - dataset@dataset_cfgs.gene3dS50: gene3dS50
  - dataset@dataset_cfgs.cathFunfam: cathFunfam
  - dataset@dataset_cfgs.ted: ted
  - dataset/example@dataset_cfgs.interpro: interpro
  - _self_
data_weights:
  openfold_aligned: 0.125
  openfold_raw: 0.125
  ec: 0.15
  gene3dS50: 0.2
  cathFunfam: 0.1
  ted: 0.3
  interpro: 0.0
batch_size: 200
max_tokens: 8000
tokenizer_path: src/data/components/profam_tokenizer.json
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
evaluate_gym: True
