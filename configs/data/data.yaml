_target_: src.data.hf_protein_datamodule.ProteinDataModule
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.openfold_aligned: openfold_aligned
  - dataset@dataset_cfgs.openfold_raw: openfold_raw
  - dataset@dataset_cfgs.ec: ec
  - dataset@dataset_cfgs.gene3dS50: gene3dS50
  - dataset@dataset_cfgs.cathFunfam: cathFunfam
  - dataset@dataset_cfgs.ted: ted
  - validation@val_dataset_cfgs.gym: gym
  - validation@val_dataset_cfgs.ec: ec
  - validation@test_dataset_cfgs.interpro: interpro
  - _self_
data_weights:
  openfold_aligned: 0.125
  openfold_raw: 0.125
  ec: 0.15
  gene3dS50: 0.2
  cathFunfam: 0.1
  ted: 0.3
batch_size: 22
max_tokens: 8000
data_dir: ../data
num_workers: null # None means use all available CPU cores
count_doc_hashes: True # count the num times each document gets sampled
use_seq_pos: True  # embed sequence relative position
max_seq_pos: 2048  # maximum sequence position
tokenizer_path: src/data/components/profam_tokenizer.json
