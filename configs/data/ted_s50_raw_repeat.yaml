_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.ted_s50_raw_repeat: ted_s50_raw_repeat
  - dataset@dataset_builders.val_ted_s50_raw_repeat: ted_s50_raw_repeat
  - _self_
total_num_train_samples: 5080  # todo get actual number
data_weights:
  ted_s50_raw_repeat: 1.0

dataset_builders:
  val_ted_s50_raw_repeat:
    name: val_ted_s50_raw_repeat
    _target_: src.data.builders.hf_datasets.SequenceDocumentMapDataset
    cfg:
      data_path_pattern: ted/s50_parquets/train_val_test_split/val/*.parquet

batch_size: 1
data_dir: ${paths.data_dir}

num_workers: 12
ignore_gaps: true
feature_names: ${constants.sequence_features}

val_dataset_batch_sizes:
    val_ted_s50_raw_repeat: 1 # greater than 1 breaks map datasets if using seq packing
pack_to_max_tokens: 20_000 # {20k < 3090 < 24k}, {32k < 4090 < ?}, {100k < A100_80 < ?}
