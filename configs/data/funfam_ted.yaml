_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.funfam_s50_ali: funfam_s50_ali
  - dataset@dataset_builders.funfam_s100_raw: funfam_s100_raw
  - dataset@dataset_builders.ted_s100_raw: ted_s100_raw
  - dataset@dataset_builders.ted_s50_raw: ted_s50_raw
  # validation sets
  - dataset@dataset_builders.pfam_val: pfam
  - dataset@dataset_builders.pfam_val_raw: pfam_raw
  - _self_
data_weights:
  funfam_s50_ali: 0.25
  funfam_s100_raw: 0.25
  ted_s100_raw: 0.25
  ted_s50_raw: 0.25



batch_size: 2
data_dir: ${paths.data_dir}


num_workers: 0
ignore_gaps: true
feature_names: ${constants.sequence_features}

val_dataset_batch_sizes:
    pfam_val: 1
    pfam_val_raw: 1

pack_to_max_tokens: 65_563
