_target_: src.data.hf_protein_datamodule.ProteinDataModule
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.gym: gym_msas_aligned
  - dataset@dataset_cfgs.gym_val: gym_val_msas_aligned
  - _self_
data_weights:
  gym: 1.0
batch_size: 3
max_tokens: 8192
data_dir: ../data
gym_dms_ids: [
  'BLAT_ECOLX_Jacquier_2013',
  'CALM1_HUMAN_Weile_2017',
  'DYR_ECOLI_Thompson_2019',
  'DLG4_RAT_McLaughlin_2012',
  'REV_HV1H2_Fernandes_2016',
  'TAT_HV1BR_Fernandes_2016',
  'RL40A_YEAST_Roscoe_2013',
  'P53_HUMAN_Giacomelli_2018_WT_Nutlin'
]
evaluate_gym: True
val_dataset_names:
  - gym_val
num_workers: null # None means use all available CPU cores
gym_data_dir: ${.data_dir}/ProteinGym
