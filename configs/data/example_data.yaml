_target_: src.data.hf_protein_datamodule.ProteinDataModule
defaults:
  - dataset/example@dataset_cfgs.openfold_aligned: openfold_aligned
  - dataset/example@dataset_cfgs.openfold_raw: openfold_raw
  - dataset/example@dataset_cfgs.ec: ec
  - dataset/example@dataset_cfgs.interpro: interpro
  - _self_
data_weights:
  interpro: 0.5
  openfold_aligned: 0.15
  openfold_raw: 0.15
  ec: 0.2
batch_size: 2
max_tokens: 5000
tokenizer_path: src/data/components/profam_tokenizer.json
evaluate_gym: true
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
max_gym_sequences: null
num_workers: null # None means use all available CPU cores
gym_data_dir: data/example_data/ProteinGym
