_target_: src.data.hf_protein_datamodule.ProteinDataModule
data_path_patterns:
  interpro: data/example_data/interpro/protein-matching-*.fasta
  openfold: data/example_data/openfold/uniclust30_filtered/*/a3m/uniclust30.a3m
  ec: data/example_data/expasy_ec/*.fasta
data_weights:
  interpro: 0.5
  openfold: 0.3
  ec: 0.2
batch_size: 2
max_tokens: 5000
tokenizer_path: src/data/components/profam_tokenizer.json
evaluate_gym: true
