_target_: src.data.hf_protein_datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_cfgs.openfold_aligned: openfold_aligned
  - dataset@dataset_cfgs.openfold_raw: openfold_raw
  - dataset@dataset_cfgs.ec: ec
  - _self_
data_weights:
  openfold_aligned: 0.5
  openfold_raw: 0.5
batch_size: 2
max_tokens: 3000
data_dir: data/example_data # example data is in repo main dir
evaluate_gym: false # not implemented yet
evaluate_ec_class: false # not implemented yet
evaluate_ec_cluster_class: false # not implemented yet
val_dataset_names:
  - interpro
  - ec
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
max_gym_sequences: null
num_workers: 0  # None means use all available CPU cores
gym_data_dir: example_data/ProteinGym
use_filtered_gym_msas: false
