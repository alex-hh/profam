_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.openfold_aligned: openfold_aligned_example
  - dataset@dataset_builders.openfold_raw: openfold_raw_example
  - dataset@dataset_builders.ec: ec_example
  - dataset/scoring@dataset_builders.proteingym: proteingym
  - _self_

data_weights:
  openfold_aligned: 0.5
  openfold_raw: 0.5

dataset_builders:
  ec:
    preprocessor:
      cfg:
        padding: "max_length"
        max_tokens_per_example: 2048
  openfold_aligned:
    preprocessor:
      cfg:
        padding: "max_length"
        max_tokens_per_example: 2048
  openfold_raw:
    preprocessor:
      cfg:
        padding: "max_length"
        max_tokens_per_example: 2048
  proteingym:
    dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
    max_tokens_per_example: 2048
    max_mutated_sequences: 10
    max_context_seqs: 2

batch_size: 2
data_dir: data/example_data # example data is in repo main dir
val_dataset_batch_sizes:
  ec: ${data.batch_size}
  proteingym: 1
num_workers: 0  # None means use all available CPU cores
feature_names: ${constants.sequence_features}
