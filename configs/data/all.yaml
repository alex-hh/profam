_target_: src.data.hf_protein_datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_cfgs.pfam: pfam
  - dataset@dataset_cfgs.pfam_raw: pfam_raw
  - dataset@dataset_cfgs.go_raw: go_raw
  - dataset@dataset_cfgs.ec_raw: ec
  - dataset@dataset_cfgs.foldseek: foldseek
  - dataset@dataset_cfgs.foldseek_reps: foldseek_representatives
  - dataset@dataset_cfgs.foldseek_interleaved: foldseek_interleaved
  - dataset@dataset_cfgs.foldseek_reps_interleaved: foldseek_representatives_interleaved
  - dataset@dataset_cfgs.ted_raw: ted
  - dataset@dataset_cfgs.gene3d_raw: gene3d
  - dataset@dataset_cfgs.gene3dS50_raw: gene3dS50
  # validation sets
  - dataset@dataset_cfgs.pfam_val: pfam
  - dataset@dataset_cfgs.pfam_val_raw: pfam_raw
  - _self_
total_num_train_samples: 9000000  # todo get actual number
data_weights:
  pfam: 0.1
  pfam_raw: 0.1
  go_raw: 0.1
  ec_raw: 0.1
  foldseek: 0.1
  foldseek_reps: 0.1
  foldseek_interleaved: 0.1
  foldseek_reps_interleaved: 0.1
  ted_raw: 0.1
  gene3d_raw: 0.1
  gene3dS50_raw: 0.1
dataset_cfgs:
  foldseek_reps_interleaved:
    minimum_mean_plddt: 0.6
    preprocessor:
      batched_map: true
      map_batch_size: 250
  pfam_val:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    shuffle: false
  pfam_val_raw:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    shuffle: false

batch_size: 6
max_tokens: 10000
data_dir: ${paths.data_dir}
val_dataset_names:
  - pfam_val
  - pfam_val_raw

evaluate_gym: true
evaluate_ec_class: false
evaluate_ec_cluster_class: false
evaluate_pfam_class: false

num_workers: 4
gym_data_dir: ProteinGym
gym_dms_ids: ${constants.gym_val_assay_list}
ignore_gaps: false
feature_names: ${constants.structure_features}
