_target_: src.data.hf_protein_datamodule.ProteinDataModule
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.pfam: pfam
  - dataset@dataset_cfgs.pfam_raw: pfam_raw
  - dataset@dataset_cfgs.pfam_msa: pfam_msa
  - dataset@dataset_cfgs.pfam_val: pfam
  - dataset@dataset_cfgs.pfam_val_raw: pfam_raw
  - dataset@dataset_cfgs.pfam_val_msa: pfam_msa
  - _self_
data_weights:
  pfam: 1.0
dataset_cfgs:
  pfam:
    holdout_data_files: ["pfam/combined_parquets/Family_95000795_101711374.parquet"]
  pfam_val:
    data_path_pattern: pfam/combined_parquets/Family_95000795_101711374.parquet
  pfam_raw:
    holdout_data_files: ["pfam/combined_parquets/Family_95000795_101711374.parquet"]
  pfam_val_raw:
    data_path_pattern: pfam/combined_parquets/Family_95000795_101711374.parquet
  pfam_msa:
    holdout_data_files: ["pfam/combined_parquets/Family_95000795_101711374.parquet"]
  pfam_val_msa:
    data_path_pattern: pfam/combined_parquets/Family_95000795_101711374.parquet
batch_size: 22
max_tokens: 8192
data_dir: ../data
val_dataset_names:
  - pfam_val
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
evaluate_gym: True
evaluate_ec_class: false
num_workers: null # None means use all available CPU cores
gym_data_dir: ProteinGym
count_doc_hashes: True # count the num times each document gets sampled
ignore_gaps: false
