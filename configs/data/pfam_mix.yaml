_target_: src.data.hf_protein_datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.pfam: pfam
  - dataset@dataset_builders.pfam_raw: pfam_raw
  - dataset@dataset_builders.pfam_msa: pfam_msa
  - dataset@dataset_builders.pfam_val: pfam
  - dataset@dataset_builders.pfam_val_raw: pfam_raw
  - dataset@dataset_builders.pfam_val_msa: pfam_msa
  - _self_
data_weights:
  pfam: 0.34
  pfam_raw: 0.33
  pfam_msa: 0.33
dataset_builders:
  pfam_val:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val
  pfam_val_raw:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val_raw
  pfam_val_msa:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val_msa
batch_size: 22
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_names:
  - pfam_val
  - pfam_val_raw
  - pfam_val_msa
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
evaluate_gym: false
evaluate_ec_class: false
evaluate_ec_cluster_class: false
num_workers: null # None means use all available CPU cores
gym_data_dir: ProteinGym
ignore_gaps: false
