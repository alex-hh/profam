_target_: src.data.datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.pfam: pfam
  - dataset@dataset_builders.pfam_raw: pfam_raw
  - dataset@dataset_builders.pfam_msa: pfam_msa
  - dataset@dataset_builders.pfam_val: pfam
  - dataset@dataset_builders.pfam_val_raw: pfam_raw
  - dataset@dataset_builders.pfam_val_msa: pfam_msa
  - _self_
data_weights:
  pfam: 0.34
  pfam_raw: 0.33
  pfam_msa: 0.33
dataset_builders:
  pfam_val:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val
    preprocessor:
      cfg:
        max_tokens_per_example: 8192
        padding: "max_length"
  pfam_val_raw:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val_raw
    preprocessor:
      cfg:
        max_tokens_per_example: 8192
        padding: "max_length"
  pfam_val_msa:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
    name: pfam_val_msa
    preprocessor:
      cfg:
        max_tokens_per_example: 8192
        padding: "max_length"
batch_size: 22
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  pfam_val: ${data.batch_size}
  pfam_val_raw: ${data.batch_size}
  pfam_val_msa: ${data.batch_size}
num_workers: null # None means use all available CPU cores
ignore_gaps: false
feature_names: ${constants.sequence_feature_names}
