# foldseek representatives single parquet file which is included in the repo
_target_: src.data.datamodule.ProteinDataMixture
dataset_builders:
  foldseek_reps:
    _target_: src.data.builders.SequenceDocumentIterableDataset
    name: foldseek_reps
    preprocessor:
      _target_: src.data.processors.ProteinDocumentPreprocessor
      cfg:
        _target_: src.data.processors.PreprocessingConfig
        document_token: '[RAW]'
        drop_first_protein: false
        keep_first_protein: false
        allow_unk: false
        max_tokens_per_example: 8192
        shuffle_proteins_in_document: true
        padding: do_not_pad
      transform_fns:
      - _target_: src.data.processors.transforms.replace_nans_in_coords
        _partial_: true
        fill_value: 0.0
    cfg:
      _target_: src.data.builders.HFProteinDatasetConfig
      data_path_pattern: example_data/foldseek_representatives/0.parquet
      holdout_data_files: null
      holdout_identifiers: null
      identifier_col: fam_id
      file_type: parquet
      minimum_sequences: null
  foldseek_reps_val:
    _target_: src.data.builders.SequenceDocumentMapDataset
    name: foldseek_reps_val
    preprocessor:
      _target_: src.data.processors.ProteinDocumentPreprocessor
      cfg:
        _target_: src.data.processors.PreprocessingConfig
        document_token: '[RAW]'
        drop_first_protein: false
        keep_first_protein: false
        allow_unk: false
        max_tokens_per_example: 8192
        shuffle_proteins_in_document: true
        padding: do_not_pad
      transform_fns:
      - _target_: src.data.processors.transforms.replace_nans_in_coords
        _partial_: true
        fill_value: 0.0
    cfg:
      _target_: src.data.builders.HFProteinDatasetConfig
      data_path_pattern: example_data/foldseek_representatives/0.parquet
      holdout_data_files: null
      holdout_identifiers: null
      identifier_col: fam_id
      file_type: parquet
      minimum_sequences: null
total_num_train_samples: 100000000
data_weights:
  foldseek_reps: 1.0
batch_size: 1
data_dir: data
num_workers: 12
ignore_gaps: true
feature_names:
  - ds_name
  - identifier
  - input_ids
  - attention_mask
  - original_size
  - residue_index
val_dataset_batch_sizes:
  foldseek_reps_val: 1
pack_to_max_tokens: 10000
