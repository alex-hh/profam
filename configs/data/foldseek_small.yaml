_target_: src.data.hf_protein_datamodule.ProteinDataModule
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.foldseek: foldseek
  - dataset@dataset_cfgs.foldseek_val: foldseek
  - _self_
data_weights:
  foldseek: 1.0
dataset_cfgs:
  foldseek:
    name: foldseek
    data_path_pattern: foldseek/1*.parquet
    is_parquet: true
    keep_gaps: false
    to_upper: false
    keep_insertions: false
    minimum_sequences: 10
  foldseek_val:
    name: foldseek_val
    data_path_pattern: foldseek/20000.parquet
    is_parquet: true
    keep_gaps: false
    to_upper: false
    keep_insertions: false
    minimum_sequences: 10
batch_size: 22
max_tokens: 8192
data_dir: ../data
val_dataset_names:
  - foldseek_val
tokenizer_path: src/data/components/profam_tokenizer.json
gym_dms_ids: ["BLAT_ECOLX_Jacquier_2013", "DLG4_RAT_McLaughlin_2012"]
evaluate_gym: True
evaluate_ec_class: false
num_workers: null # None means use all available CPU cores
gym_data_dir: ProteinGym
count_doc_hashes: True # count the num times each document gets sampled
use_seq_pos: True  # embed sequence relative position
max_seq_pos: 2048  # maximum sequence position
use_filtered_gym_msas: true