_target_: src.data.hf_protein_datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.foldseek: foldseek
  - dataset@dataset_builders.foldseek_val: foldseek
  - _self_
data_weights:
  foldseek: 1.0
dataset_builders:
  foldseek:
    data_path_pattern: foldseek/1*.parquet
    is_parquet: true
    keep_gaps: false
    to_upper: false
    keep_insertions: false
    minimum_sequences: 10
    name: foldseek
  foldseek_val:
    data_path_pattern: foldseek/20000.parquet
    is_parquet: true
    keep_gaps: false
    to_upper: false
    keep_insertions: false
    minimum_sequences: 10
    name: foldseek_val
batch_size: 22
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_names:
  - foldseek_val
num_workers: null # None means use all available CPU cores
use_filtered_gym_msas: true
