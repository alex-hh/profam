_target_: src.data.datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.foldseek: foldseek
  - dataset@dataset_builders.foldseek_3di: foldseek_with_3di_and_coords
  - dataset@dataset_builders.foldseek_val: foldseek
  - dataset@dataset_builders.foldseek_3di_val: foldseek_with_3di_and_coords
  - _self_
data_weights:
  foldseek: 0.5
  foldseek_3di: 0.5
dataset_builders:
  foldseek:
    data_path_pattern: foldseek_struct/*.parquet
    name: foldseek
  foldseek_val:
    data_path_pattern: foldseek_struct/0.parquet
    holdout_data_files: foldseek_struct/0.parquet
    name: foldseek_val
  foldseek_3di:
    data_path_pattern: foldseek_struct/*.parquet
    name: foldseek_3di
  foldseek_3di_val:
    data_path_pattern: foldseek_struct/0.parquet
    holdout_data_files: foldseek_struct/0.parquet
    name: foldseek_3di_val
batch_size: 22
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  foldseek_val: ${data.batch_size}
  foldseek_3di_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
feature_names: ${constants.all_feature_names}
