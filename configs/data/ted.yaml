_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.ted_s100_raw: ted_s100_raw
  - dataset@dataset_builders.ted_s50_raw: ted_s50_raw
  # validation sets
  - dataset@dataset_builders.ted_s50_raw_val: ted_s50_raw_map
  - _self_
data_weights:
  ted_s100_raw: 0.25
  ted_s50_raw: 0.25

dataset_builders:
  ted_s50_raw_val:
    name: ted_s50_raw_val
    cfg:
      data_path_pattern: ted/s50_parquets/train_val_test_split/val/*.parquet

batch_size: 1
data_dir: ${paths.data_dir}

num_workers: 0
ignore_gaps: true
feature_names: ${constants.sequence_features}

val_dataset_batch_sizes:
    ted_s50_raw_val: 1 # greater than 1 breaks map datasets if using seq packing
pack_to_max_tokens: 65_563
