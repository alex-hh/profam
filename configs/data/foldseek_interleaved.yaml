_target_: src.data.datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.foldseek: foldseek_interleaved
  - dataset@dataset_builders.foldseek_val: foldseek_interleaved
  - _self_
data_weights:
  foldseek: 1.0
dataset_builders:
  foldseek:
    cfg:
      holdout_data_files: foldseek_struct/0.parquet
      minimum_mean_plddt: 0.6
    preprocessor:
      cfg:
        max_tokens_per_example: 8192
        padding: "max_length"
    name: foldseek
  foldseek_val:
    cfg:
      data_path_pattern: foldseek_struct/0.parquet
      minimum_mean_plddt: 0.6
      file_repeats: 8  # for ddp
    preprocessor:
      cfg:
        max_tokens_per_example: 8192
        padding: "max_length"
    name: foldseek_val
batch_size: 6
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  foldseek_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
feature_names: ${constants.structure_features}
total_num_train_samples: 1900000
