_target_: src.data.datasets.ProteinDatasetBuilder
name: ted
defaults:
  - /preprocessor: "fasta_raw"

cfg:
  _target_: src.data.datasets.ProteinDatasetConfig
  data_path_pattern: ted/ted_s50_by_sfam/*S50_rep_seq.fasta
  holdout_data_files: null
  holdout_identifiers: null
  identifier_col: null
  file_type: text
  minimum_sequences: null
  shuffle: true
  batched_map: false
  map_batch_size: 100
  stream: true
