# debugging / benchmarking dataset for repeated sequences
_target_: src.data.builders.SequenceDocumentIterableDataset
name: toy_data_repeated_family_members
#defaults:
#  - /preprocessor: raw_repeat
cfg:
  _target_: src.data.builders.ProteinDatasetConfig
  data_path_pattern: ted/s50_parquets/*.parquet
  holdout_data_files: null
  holdout_identifiers: null
  identifier_col: "fam_id"
  file_type: parquet
  minimum_sequences: null
preprocessor:
  _target_: src.data.processors.ProteinDocumentPreprocessor
  defaults:
    - cfg: raw
  transform_fns:
    - _target_: src.data.processors.transforms.replace_nans_in_coords
      _partial_: true
      fill_value: 0.0
    - _target_: src.data.processors.transforms.repeat_random_sequence_in_family
      _partial_: true
