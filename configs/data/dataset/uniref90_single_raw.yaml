_target_: src.data.builders.SequenceDocumentIterableDataset
name: afdb_s50
defaults:
  - /preprocessor: raw

cfg:
  _target_: src.data.builders.HFProteinDatasetConfig
  data_path_pattern: uniref/uniref90_parquets_shuffled/train/*.parquet
  holdout_data_files: null
  holdout_identifiers: null
  identifier_col: "fam_id"
  file_type: parquet
  minimum_sequences: null
  map_batch_size: 200

preprocessor:
  cfg:
    max_tokens_per_example: 320
    padding: do_not_pad
    shuffle_proteins_in_document: false
