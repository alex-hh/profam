_target_: src.data.datasets.StreamedStreamedProteinDatasetBuilder
name: pfam_raw
defaults:
  - /preprocessor: "parquet_raw"

cfg:
  _target_: src.data.datasets.ProteinDatasetConfig
  data_path_pattern: pfam/train_test_split_parquets/train/*.parquet
  holdout_data_files: null
  holdout_identifiers: null
  identifier_col: 'fam_id'
  is_parquet: true
  file_type: text
  minimum_sequences: null
  shuffle: true
