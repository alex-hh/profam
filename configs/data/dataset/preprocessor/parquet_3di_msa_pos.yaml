_target_: src.data.preprocessing.ParquetStructurePreprocessor
defaults:
  - config: msa_pos
sequence_col: "msta_aa"
structure_tokens_col: "msta_3di"
infer_representative_from_identifier: true
# https://github.com/facebookresearch/hydra/issues/1939
# https://hydra.cc/docs/patterns/select_multiple_configs_from_config_group/
transform_fns:
  - _target_: src.data.transforms.interleave_structure_sequence
    _partial_: true
    max_tokens: ${data.max_tokens}
    structure_first_prob: 1.0
