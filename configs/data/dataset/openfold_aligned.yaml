_target_: src.data.datasets.ProteinDatasetBuilder
name: openfold_aligned
defaults:
  - /preprocessor: "parquet_msa"

cfg:
  _target_: src.data.datasets.ProteinDatasetConfig
  data_path_pattern: openfold/uniclust30_filtered_parquet/*.parquet
  holdout_data_files: null
  holdout_identifiers: null
  identifier_col: null
  is_parquet: true
  file_type: text
  minimum_sequences: null
  shuffle: true
  batched_map: false
  map_batch_size: 100
  stream: true
