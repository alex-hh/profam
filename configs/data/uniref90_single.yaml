_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.uniref90: uniref90_single_raw
  - dataset@dataset_builders.uniref90_val: uniref90_single_raw
  - _self_

dataset_builders:
  uniref90_val:
    _target_: src.data.builders.SequenceDocumentMapDataset
    name: uniref90_val
    cfg:
      data_path_pattern: uniref/uniref90_parquets_shuffled/val/recombinant_0.parquet

total_num_train_samples: 10000000
data_weights:
  afdb_s50: 1.0

batch_size: 1
data_dir: ${paths.data_dir}

num_workers: 12
ignore_gaps: true
feature_names: ${constants.sequence_features}

val_dataset_batch_sizes:
    afdb_s50_val: 1 # greater than 1 breaks map datasets if using seq packing
pack_to_max_tokens: 32_000
