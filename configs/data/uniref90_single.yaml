_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.uniref90: uniref90_single_raw
  - dataset@dataset_builders.uniref90_val: uniref90_single_raw
  - _self_

dataset_builders:
  uniref90_val:
    _target_: src.data.builders.SequenceDocumentMapDataset
    name: uniref90_val
    cfg:
      data_path_pattern: uniref/uniref90_parquets_shuffled/val/recombinant_0.parquet
  proteingym:
    _target_: src.data.builders.proteingym.ProteinGymDataset
    name: proteingym
    dms_ids: ${constants.gym_val_assay_list}
    seed: 42
    max_mutated_sequences: null
    mutant_bos_token: null
    keep_gaps: false
    use_filtered_msa: true
    extra_tokens_per_document: 2
    use_msa_pos: false
    num_proc: null
    max_tokens_per_example: ${data.dataset_builders.uniref90.preprocessor.cfg.max_tokens_per_example}
    max_context_seqs: 0

data_weights:
  uniref90: 1.0

batch_size: 1
data_dir: ${paths.data_dir}

num_workers: 12
ignore_gaps: true
feature_names: ${constants.sequence_features}

val_dataset_batch_sizes:
  uniref90_val: 1 # greater than 1 breaks map datasets if using seq packing
  proteingym: 1
pack_to_max_tokens: 32_000
