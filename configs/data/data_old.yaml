_target_: src.data.datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.openfold_aligned: openfold_aligned
  - dataset@dataset_builders.openfold_raw: openfold_raw
  - dataset@dataset_builders.ec: ec
  - dataset@dataset_builders.gene3dS50: gene3dS50
  - dataset@dataset_builders.cathFunfam: cathFunfam
  - dataset@dataset_builders.ted: ted
  - dataset@dataset_builders.interpro: interpro
  - _self_
data_weights:
  openfold_aligned: 0.125
  openfold_raw: 0.125
  ec: 0.15
  gene3dS50: 0.2
  cathFunfam: 0.1
  ted: 0.3
batch_size: 22
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  interpro: ${data.batch_size}
num_workers: null # None means use all available CPU cores
ignore_gaps: false
feature_names: ${constants.sequence_features}
