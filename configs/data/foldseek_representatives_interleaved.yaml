_target_: src.data.hf_protein_datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_builders.foldseek: foldseek_representatives_interleaved
  - dataset@dataset_builders.foldseek_val: foldseek_representatives_interleaved
  - _self_
data_weights:
  foldseek: 1.0
dataset_builders:
  foldseek:
    cfg:
      holdout_data_files: foldseek_representatives/0.parquet
      minimum_mean_plddt: 0.6
    name: foldseek
  foldseek_val:
    # i guess really we should just make this 0-8
    cfg:
      data_path_pattern: foldseek_representatives/0.parquet
      minimum_mean_plddt: 0.6
      shuffle: false
      file_repeats: 8  # for ddp
    name: foldseek_val
batch_size: 18
max_tokens: 1536
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  foldseek_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
feature_names: ${constants.structure_features}
total_num_train_samples: 1900000
