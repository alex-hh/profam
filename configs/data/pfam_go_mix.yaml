_target_: src.data.hf_protein_datamodule.ProteinDataMixture
# https://github.com/facebookresearch/hydra/issues/1939#issuecomment-1035395006
defaults:
  - dataset@dataset_cfgs.pfam: pfam
  - dataset@dataset_cfgs.pfam_raw: pfam_raw
  - dataset@dataset_cfgs.pfam_msa: pfam_msa
  - dataset@dataset_cfgs.go_raw: go_raw
  - dataset@dataset_cfgs.pfam_val: pfam
  - dataset@dataset_cfgs.pfam_val_raw: pfam_raw
  - dataset@dataset_cfgs.pfam_val_msa: pfam_msa
  - _self_
data_weights:
  pfam: 0.25
  pfam_raw: 0.25
  pfam_msa: 0.25
  go_raw: 0.25
dataset_cfgs:
  pfam_val:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
  pfam_val_raw:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
  pfam_val_msa:
    data_path_pattern: pfam/train_test_split_parquets/val/*.parquet
batch_size: 9
max_tokens: 10000
data_dir: ${paths.data_dir}
val_dataset_names:
  - pfam_val
  - pfam_val_raw
  - pfam_val_msa
evaluate_gym: true
evaluate_ec_class: false
evaluate_ec_cluster_class: false
evaluate_pfam_class: false
num_workers: 4 # None means use all available CPU cores
gym_data_dir: ProteinGym
ignore_gaps: false
