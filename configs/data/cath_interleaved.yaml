_target_: src.data.hf_protein_datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.cath: cath_43_interleaved
  - dataset@dataset_builders.cath_val: cath_43_interleaved
  - _self_
data_weights:
  cath: 1.0
dataset_builders:
  cath_val:
    name: cath_43_val
    split_name: validation
batch_size: 6
max_tokens: 8192
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  cath_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
use_filtered_gym_msas: true
feature_names: ${constants.all_feature_names}
