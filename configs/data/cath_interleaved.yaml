_target_: src.data.datamodule.ProteinDataMixture
defaults:
  - dataset@dataset_builders.cath43: cath_43_interleaved
  - dataset@dataset_builders.cath43_val: cath_43_interleaved
  - _self_
data_weights:
  cath43: 1.0
dataset_builders:
  cath43:
    name: cath43
    split_name: train
  cath43_val:
    name: cath43_val
    split_name: validation
batch_size: 48
max_tokens: 1026
data_dir: ${paths.data_dir}
val_dataset_batch_sizes:
  cath43_val: ${data.batch_size}
num_workers: null # None means use all available CPU cores
feature_names: ${constants.all_feature_names}
