_target_: src.models.llama.LlamaLitModule
scheduler_name: "cosine_with_min_lr"
num_warmup_steps: 2000
num_training_steps: 100000
lr: 3e-4
use_kv_cache_for_scoring: true
pass_res_pos_in_doc_as_position_ids: true
optimizer: adamw
config:
  _target_: transformers.LlamaConfig
  vocab_size: ${constants.vocab_size}
  attn_implementation: flash_attention_2  # eager/flash_attention_2/sdpa
  attention_bias: false
  attention_dropout: 0.0
  head_dim: 64
  hidden_act: "silu"
  hidden_size: 768
  initializer_range: 0.02
  intermediate_size: 3072
  max_position_embeddings: 131072 #  theoretical maximum sequence length
  mlp_bias: false
  model_type: "llama"
  num_attention_heads: 12
  num_hidden_layers: 12
  num_key_value_heads: 6
  rms_norm_eps: 1e-05
  rope_scaling:
    factor: 32.0 # model handles sequences up to {factor} times longer than orig max contex
    high_freq_factor: 4.0
    low_freq_factor: 1.0
    original_max_position_embeddings: 32000 # indicates max seq len model initially trained with
    rope_type: "llama3"
  rope_theta: 500000.0 # higher means longer context at expense of fine detail
  tie_word_embeddings: false
  torch_dtype: "bfloat16"
  transformers_version: "4.45.0.dev0"
  use_cache: true
  pretraining_tp: 1 # tensor parallelism - should always be 1 in the case of ddp I think
