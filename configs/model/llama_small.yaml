_target_: src.models.llama.LlamaLitModule
scheduler_name: "inverse_sqrt"
num_warmup_steps: 1000
lr: 1e-4
embed_coords: false
embed_seq_pos_in_doc: false
embed_res_pos_in_seq: true
max_seq_pos_in_doc: 1024
max_res_pos_in_seq: 4096
config:
  _target_: transformers.LlamaConfig
  vocab_size: ${constants.vocab_size}
  hidden_size: 768
  intermediate_size: 3072
  num_attention_heads: 12
  num_hidden_layers: 6
  rope_theta: 500000
  max_position_embeddings: 8192  # used in llama rope implementation
  scoring_max_tokens: 10240
  attn_implementation: null  # eager/flash_attention_2/sdpa
