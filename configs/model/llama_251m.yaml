_target_: src.models.llama.LlamaLitModule
scheduler_name: "cosine_with_min_lr"
num_warmup_steps: 1000
num_training_steps: 50000
lr: 1e-3
use_kv_cache_for_scoring: true
use_focal_loss: false
focal_gamma: null
pass_res_pos_in_doc_as_position_ids: true
optimizer: adamw
config:
  _target_: transformers.LlamaConfig
  vocab_size: ${constants.vocab_size}
  hidden_size: 1024
  intermediate_size: 4096
  num_attention_heads: 16 # head_dim = hidden_size / num_attention_heads
  num_hidden_layers: 16
  num_key_value_heads: 8
  rope_theta: 500000  # n.b. llama uses 500,000
  max_position_embeddings: 131072  # used in llama rope implementation
  scoring_max_tokens: 10240
  attn_implementation: flash_attention_2  # eager/flash_attention_2/sdpa
  attention_bias: false
  attention_dropout: 0.0
  rms_norm_eps: 1e-05
  hidden_act: "silu"
  torch_dtype: "bfloat16"
  use_cache: true
  pretraining_tp: 1 # tensor parallelism - should always be 1 in the case of ddp I think
  rope_scaling:
    factor: 32.0 # model handles sequences up to {factor} times longer than orig max contex
    high_freq_factor: 4.0
    low_freq_factor: 1.0
    original_max_position_embeddings: 32000 # indicates max seq len model initially trained with
    rope_type: "llama3"
