# N.B. this model requires COORDS TO BE DUPLICATED ON THE SEQUENCE SIDE
# A llama small model trained on foldseek representatives
_target_: src.models.inference.ProFamSampler
defaults:
  - /model: llama_small
  - /tokenizer@model.tokenizer: profam
  - /data/dataset/preprocessor@prompt_builder.preprocessor: parquet_structure
name: neat-thunder_T${.sampling_kwargs.temperature}  # suggestion: use wandb run name
checkpoint_path: outputs/inverse_folding/neat-thunder/checkpoints/last.ckpt
match_representative_length: true
sampling_kwargs:
  batch_size: 48
  temperature: 0.3
prompt_builder:
  _target_: src.models.inference.InterleavedInverseFoldingPromptBuilder
  preprocessor:
    structure_tokens_col: null
    config:
      document_token: "[AFDB]"
  max_tokens: 1536
  seed: 42
model:
  scoring_max_tokens: 10240
  embed_coords: True
  tokenizer:
    max_tokens: 1536

