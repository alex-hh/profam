_target_: src.data.preprocessing.ParquetStructurePreprocessor
defaults:
  - config: raw
structure_tokens_col: "msta_3di"
interleave_structure_sequence: false
# https://github.com/facebookresearch/hydra/issues/1939
# https://hydra.cc/docs/patterns/select_multiple_configs_from_config_group/
transform_fns:
  - _target_: src.data.transforms.apply_plddt_mask
    _partial_: true
    threshold: 80.0
  - _target_: src.data.transforms.centre_backbones
    _partial_: true
    scale: 6.0
  - _target_: src.data.transforms.rescale_backbones
    _partial_: true
  - _target_: src.data.transforms.rotate_backbones
    _partial_: true
  - _target_: src.data.transforms.replace_nans_in_coords
    _partial_: true
    fill_value: 0.0
